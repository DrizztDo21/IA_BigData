services:

  # ALMACENAMIENTO: HDFS (Hadoop 3.4.2 Oficial)
  namenode:
    image: apache/hadoop:3.4.2
    container_name: namenode
    hostname: namenode
    user: root
    ports:
      - "9870:9870"
      - "9000:9000"
    command: >
      /bin/bash -c "
      echo '<configuration><property><name>fs.defaultFS</name><value>hdfs://namenode:9000</value></property></configuration>' > /opt/hadoop/etc/hadoop/core-site.xml &&
      echo '<configuration><property><name>dfs.namenode.name.dir</name><value>file:///hadoop/dfs/name</value></property><property><name>dfs.replication</name><value>1</value></property><property><name>dfs.permissions.enabled</name><value>false</value></property></configuration>' > /opt/hadoop/etc/hadoop/hdfs-site.xml &&
      if [ ! -f /hadoop/dfs/name/current/VERSION ]; then /opt/hadoop/bin/hdfs namenode -format TransportCluster -force -nonInteractive; fi &&
      /opt/hadoop/bin/hdfs namenode"
    networks:
      - bigdata-net
    volumes:
      - hdfs_namenode:/hadoop/dfs/name
      - ./shared_workspace:/opt/workspace

  datanode:
    image: apache/hadoop:3.4.2
    container_name: datanode
    user: root
    depends_on:
      - namenode
    command: >
      /bin/bash -c "
      echo '<configuration><property><name>fs.defaultFS</name><value>hdfs://namenode:9000</value></property></configuration>' > /opt/hadoop/etc/hadoop/core-site.xml &&
      echo '<configuration><property><name>dfs.datanode.data.dir</name><value>file:///hadoop/dfs/data</value></property></configuration>' > /opt/hadoop/etc/hadoop/hdfs-site.xml &&
      /opt/hadoop/bin/hdfs datanode"
    networks:
      - bigdata-net
    volumes:
      - hdfs_datanode:/hadoop/dfs/data

  # GESTIÓN DE RECURSOS: YARN (Hadoop 3.4.2 Oficial)
  resourcemanager:
    build:
      context: .
      dockerfile: Dockerfile.hadoop
    container_name: resourcemanager
    user: root
    ports:
      - "8088:8088"
    depends_on:
      - namenode
      - datanode
    command: >
      /bin/bash -c "
      echo '<configuration><property><name>fs.defaultFS</name><value>hdfs://namenode:9000</value></property></configuration>' > /opt/hadoop/etc/hadoop/core-site.xml &&
      echo '<configuration><property><name>yarn.resourcemanager.hostname</name><value>resourcemanager</value></property></configuration>' > /opt/hadoop/etc/hadoop/yarn-site.xml &&
      sed -i 's|</configuration>|<property><name>yarn.scheduler.capacity.maximum-am-resource-percent</name><value>1.0</value></property></configuration>|g' /opt/hadoop/etc/hadoop/capacity-scheduler.xml &&
      /opt/hadoop/bin/yarn resourcemanager"
    networks:
      - bigdata-net
    volumes:
      - ./shared_workspace:/opt/workspace

  nodemanager-1:
    build:
      context: .
      dockerfile: Dockerfile.hadoop
    container_name: nodemanager-1
    user: root
    depends_on:
      - resourcemanager
    command: >
      /bin/bash -c "
      echo '<configuration><property><name>fs.defaultFS</name><value>hdfs://namenode:9000</value></property></configuration>' > /opt/hadoop/etc/hadoop/core-site.xml &&
      echo '<configuration>
      <property><name>yarn.resourcemanager.hostname</name><value>resourcemanager</value></property>
      <property><name>yarn.nodemanager.resource.memory-mb</name><value>4092</value></property>
      <property><name>yarn.scheduler.maximum-allocation-mb</name><value>4092</value></property>
      <property><name>yarn.nodemanager.resource.cpu-vcores</name><value>4</value></property>
      <property><name>yarn.nodemanager.vmem-check-enabled</name><value>false</value></property>
      </configuration>' > /opt/hadoop/etc/hadoop/yarn-site.xml &&
      /opt/hadoop/bin/yarn nodemanager"
    networks:
      - bigdata-net
    ports:
      - "8042:8042"
    volumes:
      - ./shared_workspace:/opt/workspace
    

  nodemanager-2:
    build:
      context: .
      dockerfile: Dockerfile.hadoop
    container_name: nodemanager-2
    user: root
    depends_on:
      - resourcemanager
    command: >
      /bin/bash -c "
      echo '<configuration><property><name>fs.defaultFS</name><value>hdfs://namenode:9000</value></property></configuration>' > /opt/hadoop/etc/hadoop/core-site.xml &&
      echo '<configuration>
      <property><name>yarn.resourcemanager.hostname</name><value>resourcemanager</value></property>
      <property><name>yarn.nodemanager.resource.memory-mb</name><value>4092</value></property>
      <property><name>yarn.scheduler.maximum-allocation-mb</name><value>4092</value></property>
      <property><name>yarn.nodemanager.resource.cpu-vcores</name><value>4</value></property>
      <property><name>yarn.nodemanager.vmem-check-enabled</name><value>false</value></property>
      </configuration>' > /opt/hadoop/etc/hadoop/yarn-site.xml &&
      /opt/hadoop/bin/yarn nodemanager"
    networks:
      - bigdata-net
    ports:
      - "8043:8042"
    volumes:
      - ./shared_workspace:/opt/workspace

  # INGESTA: Kafka (KRaft mode) & NiFi
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka-broker
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
    ports:
      - "9092:9092"
    networks:
      - bigdata-net
    volumes:
      - kafka_data:/tmp/kraft-combined-logs

  nifi:
    build: 
      context: .
      dockerfile: Dockerfile.nifi
    container_name: nifi
    ports:
      - "8443:8443"
    environment:
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=SuperSecurePassword123!
    depends_on:
      - namenode
    networks:
      - bigdata-net
    volumes:
      - nifi_conf:/opt/nifi/nifi-current/conf
      - nifi_database:/opt/nifi/nifi-current/database_repository
      - nifi_flowfile:/opt/nifi/nifi-current/flowfile_repository
      - nifi_content:/opt/nifi/nifi-current/content_repository
      - nifi_provenance:/opt/nifi/nifi-current/provenance_repository
      - nifi_state:/opt/nifi/nifi-current/state
      - ./shared_workspace:/opt/workspace

 
  # ALMACENAMIENTO: Cassandra
  cassandra-db:
    image: cassandra:5.0
    container_name: cassandra-db
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=TransportCluster
      - JVM_OPTS=-Xms1G -Xmx1G
    networks:
      - bigdata-net
    volumes:
      - cassandra_data:/var/lib/cassandra

  # ORQUESTACIÓN: Airflow (Standalone)
  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-web
    ports:
      - "8081:8080"
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - HADOOP_CONF_DIR=/opt/workspace
    command: standalone
    networks:
      - bigdata-net
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - airflow_data:/opt/airflow
      - ./shared_workspace:/opt/workspace

  # ==========================================
  # INICIALIZADORES AUTOMÁTICOS
  # ==========================================
  
  kafka-init:
    image: apache/kafka:3.9.0
    container_name: kafka-init
    depends_on:
      - kafka
    networks:
      - bigdata-net
    command: >
      bash -c "
      echo 'Esperando a que Kafka levante (20 segundos)...'
      sleep 20
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-broker:9092 --create --topic datos_visitas --partitions 3 --replication-factor 1 --if-not-exists
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-broker:9092 --create --topic datos_pagos --partitions 1 --replication-factor 1 --if-not-exists
      echo '¡Topics de Kafka creados con éxito!'
      "

  cassandra-init:
    image: cassandra:5.0
    container_name: cassandra-init
    depends_on:
      - cassandra-db
    networks:
      - bigdata-net
    volumes:
      - ./shared_workspace:/opt/workspace
    command: >
      bash -c "
      echo 'Esperando a que Cassandra despierte...';
      sleep 45;
      cqlsh cassandra-db -f /opt/workspace/init.cql;
      echo 'Base de datos instanciada correctamente.';
      "


  # ==========================================
  # API REST (FastAPI)
  # ==========================================
  market-api:
    image: python:3.12-slim
    container_name: market-api
    working_dir: /app
    volumes:
      - ./api:/app
    networks:
      - bigdata-net
    command: >
      bash -c "pip install fastapi uvicorn sse-starlette && uvicorn api_market:app --host 0.0.0.0 --port 8000"
    ports:
      - "8005:8000"

  # ==========================================
  # Dashboard (Streamlit)
  # ==========================================

  dashboard:
    image: python:3.11-slim
    container_name: dashboard-fraude
    depends_on:
      - cassandra-db
    networks:
      - bigdata-net
    ports:
      - "8501:8501"
    volumes:
      - ./shared_workspace:/opt/workspace
    command: >
      bash -c "
      pip install streamlit cassandra-driver pandas pyvis networkx &&
      streamlit run /opt/workspace/dashboard.py --server.port=8501 --server.address=0.0.0.0
      "

networks:
  bigdata-net:
    driver: bridge

volumes:
  hdfs_namenode:
  hdfs_datanode:
  kafka_data:
  nifi_conf:
  nifi_database:
  nifi_flowfile:
  nifi_content:
  nifi_provenance:
  nifi_state:
  cassandra_data:
  airflow_data: